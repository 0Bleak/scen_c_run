gnb_id: 531
gnb_id_bit_length: 32
gnb_du_id: 1
f1ap:
  cu_cp_addr: 127.0.10.1
  bind_addr: 127.0.10.2
f1u:
  socket:
    - bind_addr: 127.0.10.2
ru_sdr:
  device_driver: zmq
  device_args: tx_port=tcp://127.0.0.1:3000,rx_port=tcp://127.0.0.1:3009,base_srate=11.52e6
  srate: 11.52
  tx_gain: 75
  rx_gain: 75
cell_cfg:
  dl_arfcn: 368500
  band: 3
  channel_bandwidth_MHz: 10
  common_scs: 15
  plmn: "00101"
  tac: 7
  pci: 2
  sector_id: 1
  pdcch:
    common: { ss0_index: 0, coreset0_index: 6 }
    dedicated: { ss2_type: common, dci_format_0_1_and_1_1: false }
  prach:
    prach_config_index: 1
    total_nof_ra_preambles: 64
    nof_cb_preambles_per_ssb: 64
  pdsch: { mcs_table: qam64 }
  pusch: { mcs_table: qam64, target_sinr: 2.0 }
  slicing:
    - { sst: 1, sd: 1, sched_cfg: { min_prb_policy_ratio: 0, max_prb_policy_ratio: 100 } }
    - { sst: 1, sd: 2, sched_cfg: { min_prb_policy_ratio: 0, max_prb_policy_ratio: 100 } }
    - { sst: 1, sd: 3, sched_cfg: { min_prb_policy_ratio: 0, max_prb_policy_ratio: 100 } }
e2:
  enable_du_e2: true
  e2sm_kpm_enabled: true
  e2sm_rc_enabled: true
  addr: 10.0.2.10
  bind_addr: 10.0.2.1
  port: 36421
metrics:
  enable_json: true
  layers: { enable_sched: true, enable_rlc: true }
  periodicity: { du_report_period: 1000 }
remote_control:
  bind_addr: 0.0.0.0
  port: 8003
  enabled: true
log:
  filename: /tmp/du_zmq_01.log
  all_level: info